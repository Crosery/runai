<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>runai router · telemetry</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>runai router</h1>
          <span class="sub">telemetry dashboard</span>
        </div>
      </div>
      <nav class="filters" aria-label="filters">
        <span class="live-pulse" id="live-indicator" title="每 5 秒自动刷新">
          <span class="dot"></span>
          <span id="live-text">实时</span>
        </span>
        <select id="hours" aria-label="window">
          <option value="">全部时间</option>
          <option value="1">最近 1 小时</option>
          <option value="24" selected>最近 24 小时</option>
          <option value="168">最近 7 天</option>
          <option value="720">最近 30 天</option>
        </select>
        <select id="model" aria-label="model">
          <option value="">全部模型</option>
        </select>
        <label class="toggle">
          <input type="checkbox" id="hit_only">
          只看命中
        </label>
        <button type="button" id="refresh" class="primary">刷新</button>
      </nav>
    </header>

    <section class="kpis" aria-label="key metrics">
      <article class="kpi accent-ok" id="kpi-card-total">
        <div class="label">总调用</div>
        <div class="value" id="kpi-total">—</div>
        <div class="delta" id="kpi-total-sub"></div>
      </article>
      <article class="kpi accent-ok" id="kpi-card-hit">
        <div class="label">命中率</div>
        <div class="value" id="kpi-hit">—<span class="unit">%</span></div>
        <div class="delta" id="kpi-hit-sub"></div>
      </article>
      <article class="kpi">
        <div class="label">平均延迟</div>
        <div class="value" id="kpi-latency">—<span class="unit">ms</span></div>
        <div class="delta" id="kpi-latency-sub"></div>
      </article>
      <article class="kpi">
        <div class="label">平均输入</div>
        <div class="value" id="kpi-tokens">—<span class="unit">tok</span></div>
        <div class="delta" id="kpi-tokens-sub"></div>
      </article>
      <article class="kpi accent-err">
        <div class="label">错误数</div>
        <div class="value" id="kpi-errors">—</div>
        <div class="delta" id="kpi-errors-sub"></div>
      </article>
    </section>

    <section class="panel" aria-label="trend">
      <header>
        <h2>调用趋势</h2>
        <div class="legend">
          <span><span class="swatch sw-total"></span>总调用</span>
          <span><span class="swatch sw-hit"></span>命中</span>
          <span><span class="swatch sw-err"></span>错误</span>
        </div>
      </header>
      <svg class="chart" id="trend-chart" viewBox="0 0 800 200" preserveAspectRatio="none" role="img" aria-label="时间趋势">
        <defs>
          <linearGradient id="gradTotal" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <g class="grid"></g>
        <g class="axis-x axis"></g>
        <g class="series"></g>
      </svg>
    </section>

    <section class="panel" aria-label="per model">
      <header>
        <h2>按模型分组</h2>
        <div class="meta" id="model-count"></div>
      </header>
      <div class="model-strip" id="model-strip"></div>
    </section>

    <section class="panel" aria-label="skills">
      <header>
        <h2>Skill 评分</h2>
        <div class="meta" id="skills-progress"></div>
      </header>
      <div class="skills-filters">
        <input type="text" id="skill-filter" class="ctrl" placeholder="筛选 skill 名 / 描述 / summary" />
        <select id="skill-sort" class="ctrl">
          <option value="score-desc">综合分高 → 低</option>
          <option value="score-asc">综合分低 → 高</option>
          <option value="used-desc">使用次数高 → 低</option>
          <option value="name">按名字</option>
          <option value="unrated">未评分优先</option>
          <option value="unenriched">未富集优先</option>
        </select>
      </div>
      <div class="events-wrap">
        <table class="events skills-table">
          <thead>
            <tr>
              <th>skill</th>
              <th class="num">used</th>
              <th class="num">LLM</th>
              <th>用户评分</th>
              <th class="num">综合</th>
              <th>summary</th>
            </tr>
          </thead>
          <tbody id="skills-body"></tbody>
        </table>
      </div>
    </section>

    <section class="panel" aria-label="events">
      <header>
        <h2>最近事件</h2>
        <div class="meta" id="events-count"></div>
      </header>
      <div class="events-wrap">
        <table class="events">
          <thead>
            <tr>
              <th>时间</th>
              <th>模型</th>
              <th>状态</th>
              <th>模式</th>
              <th>BM25</th>
              <th class="num">tokens</th>
              <th class="num">延迟</th>
              <th>chosen</th>
              <th>prompt</th>
            </tr>
          </thead>
          <tbody id="events-body"></tbody>
        </table>
      </div>
      <div id="empty-state" class="empty" hidden>
        <div class="icon"></div>
        <div class="title">这个区间没有事件</div>
        <div class="hint">切换时间窗口或关闭过滤试试</div>
      </div>
      <div class="pager">
        <button type="button" id="prev">上一页</button>
        <span id="page-info" class="info"></span>
        <button type="button" id="next">下一页</button>
      </div>
    </section>
  </div>

  <dialog id="detail">
    <div class="head">
      <h2>事件详情<span class="id-tag" id="detail-id"></span></h2>
      <button id="detail-close" type="button">关闭</button>
    </div>
    <div id="detail-body"></div>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
